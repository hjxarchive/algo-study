name: Weekly Dashboard

on:
  push:
    branches:
      - main # 공용 레포 main에 머지되거나, Fork 레포에서 Sync할 때 확실하게 트리거링

  workflow_dispatch:

  # 매주 월요일 00:00 KST (UTC 일요일 15:00)
  schedule:
    - cron: '0 15 * * 0'

permissions:
  contents: write
  pull-requests: read # 안전한 PR 데이터 조회를 위해 권한 추가

concurrency:
  group: weekly-dashboard
  cancel-in-progress: true

jobs:
  dashboard:
    # github-actions bot이 스스로 만든 커밋으로 인한 무한 루프 재실행 방지
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      # =========================================
      # 0️⃣ Repository Checkout
      # =========================================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main # 트리거된 컨텍스트의 main 브랜치 소스코드를 명시적으로 지정
          fetch-depth: 0
          persist-credentials: true

      # =========================================
      # 1️⃣ Debug Workflow Info
      # =========================================
      - name: Debug Workflow Context
        run: |
          echo "===== GITHUB CONTEXT ====="
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "repository=${{ github.repository }}"
          echo "actor=${{ github.actor }}"

      # =========================================
      # 2️⃣ Weekly PR Stats 생성
      # =========================================
      - name: Generate Weekly Stats
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // KST 기준 이번 주 월요일 00:00 계산
            const now = new Date();
            const kstNow = new Date(
              now.toLocaleString("en-US", {
                timeZone: "Asia/Seoul"
              })
            );

            const day = kstNow.getDay();
            const diff = day === 0 ? 6 : day - 1;

            kstNow.setDate(kstNow.getDate() - diff);
            kstNow.setHours(0, 0, 0, 0);

            const mondayUTC = new Date(kstNow.toISOString());

            console.log("KST Monday:", kstNow.toISOString());
            console.log("UTC Monday:", mondayUTC.toISOString());

            // Closed PR 전체 조회
            const pulls = await github.paginate(
              github.rest.pulls.list,
              {
                owner,
                repo,
                state: "closed",
                per_page: 100
              }
            );

            console.log("Total closed PRs:", pulls.length);

            // 이번 주 merge된 PR만 필터링
            const weekly = pulls.filter(pr => {
              return (
                pr.merged_at &&
                new Date(pr.merged_at) >= mondayUTC
              );
            });

            console.log("Merged PR count this week:", weekly.length);

            // 작성자별 집계
            const counts = {};
            weekly.forEach(pr => {
              const author = pr.user.login;
              if (!counts[author]) {
                counts[author] = 0;
              }
              counts[author]++;
            });

            // Markdown Table 생성
            let table = "";
            table += `📅 기준 주간 시작: ${kstNow.toISOString().slice(0, 10)} (월요일 00:00 KST)\n\n`;
            table += "| Member | Count | Status |\n";
            table += "|--------|-------|--------|\n";

            const authors = Object.keys(counts).sort();

            if (authors.length === 0) {
              table += "| - | 0 | ❌ |\n";
            } else {
              authors.forEach(user => {
                const count = counts[user];
                const status = count >= 5 ? "✅" : "❌";
                table += `| ${user} | ${count} | ${status} |\n`;
              });
            }

            console.log(table);
            fs.writeFileSync("dashboard_table.txt", table);

      # =========================================
      # 3️⃣ README 업데이트
      # =========================================
      - name: Inject Dashboard into README
        run: |
          python <<'PY'
          from pathlib import Path

          readme = Path("README.md")
          table = Path("dashboard_table.txt")

          if not readme.exists():
              raise FileNotFoundError("README.md not found")

          if not table.exists():
              raise FileNotFoundError("dashboard_table.txt not found")

          content = readme.read_text(encoding="utf-8")
          dashboard = table.read_text(encoding="utf-8").strip()

          start = ""
          end = ""

          if start not in content or end not in content:
              raise ValueError("Markers not found in README.md")

          before = content.split(start)[0]
          after = content.split(end)[1]

          updated = before + start + "\n" + dashboard + "\n" + end + after
          readme.write_text(updated, encoding="utf-8")

          print("README updated successfully")
          PY

      # =========================================
      # 4️⃣ README 변경 확인
      # =========================================
      - name: Verify README Changes
        run: |
          echo "===== README Preview ====="
          cat README.md
          echo ""
          echo "===== Git Diff ====="
          git diff

      # =========================================
      # 5️⃣ Commit & Push
      # =========================================
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --staged --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "📊 weekly dashboard update"
          git pull --rebase origin main

          for i in 1 2 3
          do
            git push origin HEAD:main && break
            echo "Push failed. Retry $i/3"
            if [ $i -eq 3 ]; then
              echo "Push failed after 3 attempts"
              exit 1
            fi
            sleep 5
          done

      # =========================================
      # 6️⃣ 최종 상태 출력
      # =========================================
      - name: Final Git Status
        run: |
          echo "===== FINAL GIT STATUS ====="
          git status
          echo ""
          echo "===== RECENT COMMITS ====="
          git log --oneline -5
