name: Weekly Dashboard

on:
  push:

  workflow_dispatch:

  schedule:
    - cron: '0 15 * * 0'

permissions:
  contents: write

concurrency:
  group: weekly-dashboard
  cancel-in-progress: true

jobs:
  dashboard:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      # =========================================
      # 0️⃣ Repository Checkout
      # =========================================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # =========================================
      # 1️⃣ Debug Info
      # =========================================
      - name: Debug Workflow Context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "repository=${{ github.repository }}"
          echo "actor=${{ github.actor }}"

      # =========================================
      # 2️⃣ 이번 주 PR 통계 계산
      # =========================================
      - name: Generate Weekly Stats
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // =====================================
            // KST 기준 이번 주 월요일 00:00
            // =====================================
            const now = new Date();

            const kstNow = new Date(
              now.toLocaleString("en-US", {
                timeZone: "Asia/Seoul"
              })
            );

            const day = kstNow.getDay();

            // Sunday(0) → 6
            // Monday(1) → 0
            const diff = day === 0 ? 6 : day - 1;

            kstNow.setDate(kstNow.getDate() - diff);
            kstNow.setHours(0, 0, 0, 0);

            const mondayUTC = new Date(kstNow.toISOString());

            console.log("KST Monday:", kstNow.toISOString());
            console.log("UTC Monday:", mondayUTC.toISOString());

            // =====================================
            // 모든 Closed PR 가져오기 (Pagination)
            // =====================================
            const pulls = await github.paginate(
              github.rest.pulls.list,
              {
                owner,
                repo,
                state: "closed",
                per_page: 100
              }
            );

            console.log("Total closed PRs:", pulls.length);

            // =====================================
            // 이번 주 merge된 PR 필터링
            // =====================================
            const weekly = pulls.filter(pr => {
              return (
                pr.merged_at &&
                new Date(pr.merged_at) >= mondayUTC
              );
            });

            console.log(
              "Merged PR count this week:",
              weekly.length
            );

            // =====================================
            // 작성자별 집계
            // =====================================
            const counts = {};

            weekly.forEach(pr => {
              const author = pr.user.login;

              if (!counts[author]) {
                counts[author] = 0;
              }

              counts[author]++;
            });

            // =====================================
            // Markdown Table 생성
            // =====================================
            let table = "";

            table += `📅 기준 주간 시작: ${kstNow
              .toISOString()
              .slice(0, 10)} (월요일 00:00 KST)\n\n`;

            table += "| Member | Count | Status |\n";
            table += "|--------|-------|--------|\n";

            const authors = Object.keys(counts).sort();

            if (authors.length === 0) {
              table += "| - | 0 | ❌ |\n";
            } else {
              authors.forEach(user => {
                const count = counts[user];
                const status = count >= 5
                  ? "✅"
                  : "❌";

                table += `| ${user} | ${count} | ${status} |\n`;
              });
            }

            console.log(table);

            fs.writeFileSync(
              "dashboard_table.txt",
              table
            );

      # =========================================
      # 3️⃣ README 업데이트
      # =========================================
      - name: Inject Dashboard into README
        run: |
          if [ ! -f README.md ]; then
            echo "README.md not found"
            exit 1
          fi

          if [ ! -f dashboard_table.txt ]; then
            echo "dashboard_table.txt not found"
            exit 1
          fi

          awk '
          BEGIN {
            while ((getline line < "dashboard_table.txt") > 0) {
              table = table line "\n"
            }
          }

          /<!-- WEEKLY_DASHBOARD_START -->/ {
            print
            printf "%s", table
            in_section = 1
            next
          }

          /<!-- WEEKLY_DASHBOARD_END -->/ {
            in_section = 0
          }

          !in_section || /<!-- WEEKLY_DASHBOARD_END -->/
          ' README.md > README.md.tmp

          mv README.md.tmp README.md

      # =========================================
      # 4️⃣ 변경 확인
      # =========================================
      - name: Verify README Changes
        run: |
          echo "===== README Preview ====="
          cat README.md

          echo ""
          echo "===== Git Diff ====="
          git diff

      # =========================================
      # 5️⃣ Commit & Push
      # =========================================
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add README.md

          # 변경사항 없으면 종료
          if git diff --staged --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "📊 weekly dashboard update"

          # 최신 원격 반영
          git pull --rebase origin main

          # push 재시도
          for i in 1 2 3
          do
            git push origin HEAD:main && break

            echo "Push failed. Retry $i/3"

            if [ $i -eq 3 ]; then
              echo "Push failed after 3 attempts"
              exit 1
            fi

            sleep 5
          done

      # =========================================
      # 6️⃣ 최종 상태 출력
      # =========================================
      - name: Final Git Status
        run: |
          git status
          git log --oneline -5
